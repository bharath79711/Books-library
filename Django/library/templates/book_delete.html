<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Book</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            margin: 0;
            padding: 60px;
            text-align: center;
        }
        h1 {
            color: #c0392b;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .delete-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: inline-block;
            padding: 30px;
            text-align: center;
            max-width: 400px;
        }
        .delete-box p {
            font-size: 1.1em;
            margin: 20px 0;
            color: #34495e;
        }
        form input[type="submit"] {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s ease;
        }
        form input[type="submit"]:hover {
            background: #c0392b;
            transform: translateY(-3px);
        }
        .actions {
            margin-top: 20px;
        }
        .actions a {
            text-decoration: none;
            background: #2980b9;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            margin: 0 10px;
            font-size: 1em;
            transition: background 0.3s ease, transform 0.3s ease;
        }
        .actions a:hover {
            background: #3498db;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <h1>⚠️ Delete Book</h1>

    <div class="delete-box">
        <p>Are you sure you want to delete <strong>"{{ book.title }}"</strong>?</p>
        <form action="" method="POST">
            {% csrf_token %}
            <input type="submit" value="Confirm Delete">
        </form>
    </div>

    <div class="actions">
        <a href="{% url 'book_list' %}">⬅ Back to Book List</a>
        <a href="{% url 'home' %}">🏠 Home</a>
    </div>
</body>
</html>
