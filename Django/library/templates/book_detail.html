<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ book.title }}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 60px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .book-details {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: inline-block;
            padding: 30px;
            text-align: left;
            max-width: 400px;
        }
        .book-details p {
            font-size: 1.1em;
            margin: 10px 0;
            color: #34495e;
        }
        .actions {
            margin-top: 20px;
            text-align: center;
        }
        .actions a {
            text-decoration: none;
            background: #16a085;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            margin: 0 10px;
            font-size: 1em;
            transition: background 0.3s ease, transform 0.3s ease;
        }
        .actions a:hover {
            background: #1abc9c;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <h1>{{ book.title }}</h1>

    <div class="book-details">
        <p><strong>Author:</strong> {{ book.author }}</p>
        <p><strong>Price:</strong> {{ book.price }}</p>
        <p><strong>Quantity:</strong> {{ book.quantity }}</p>
    </div>

    <div class="actions">
        <a href="{% url 'book_update' book.id %}">✏️ Update</a>
        <a href="{% url 'book_delete' book.id %}" class="delete-btn">🗑️ Delete</a>
        <a href="{% url 'book_list' %}">⬅ Back to Book List</a>
    </div>
</body>
</html>
